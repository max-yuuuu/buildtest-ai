services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: buildtest
      POSTGRES_PASSWORD: buildtest
      POSTGRES_DB: buildtest
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buildtest"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
      target: dev
    env_file:
      - ./.env
      - ./env/common.env
      - ./env/dev.docker.env
    dns:
      - 223.5.5.5
      - 119.29.29.29
      - 8.8.8.8
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  celery-worker:
    build:
      context: ./backend
      target: dev
    env_file:
      - ./.env
      - ./env/common.env
      - ./env/dev.docker.env
    dns:
      - 223.5.5.5
      - 119.29.29.29
      - 8.8.8.8
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    entrypoint: []

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file:
      - ./.env
      - ./env/common.env
      - ./env/dev.docker.env
    environment:
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  qdrant_data:
