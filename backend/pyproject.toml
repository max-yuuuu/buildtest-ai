[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = [
    "-ra",
    "--strict-markers",
    "--cov=app",
    "--cov-report=term-missing",
    "--cov-fail-under=80",
]
markers = [
    "integration: 需要真实外部依赖(DB/Redis/Qdrant)",
    "e2e: 端到端测试",
]

[tool.coverage.run]
source = ["app"]
omit = ["app/main.py", "*/migrations/*", "*/__init__.py"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
