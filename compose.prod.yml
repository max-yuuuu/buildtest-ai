services:
  backend:
    build:
      context: ./backend
      target: runner
    env_file:
      - ./.env
      - ./env/common.env
      - ./env/prod.env
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./uploads:/app/uploads
    security_opt:
      - no-new-privileges:true

  celery-worker:
    build:
      context: ./backend
      target: runner
    env_file:
      - ./.env
      - ./env/common.env
      - ./env/prod.env
    restart: unless-stopped
    command: celery -A app.core.celery_app worker -l info
    volumes:
      - ./uploads:/app/uploads
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      target: runner
    env_file:
      - ./.env
      - ./env/common.env
      - ./env/prod.env
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
    command: node server.js
    security_opt:
      - no-new-privileges:true
